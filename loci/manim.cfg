# Shared manim defaults for every scene in media/.
# Build artifacts (partial movies, images, Tex, final mp4s) go to ./.build,
# which is gitignored. render.py copies the final mp4 to the node's mirrored
# path (media/<same relative path as k-graph>/<node-id>.mp4).
[CLI]
media_dir = ./.build
background_color = #0E1116
frame_rate = 60
disable_caching = False
