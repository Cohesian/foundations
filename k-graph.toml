# K-graph resolution config.
#
# k-graph/ nodes are origin-agnostic: a leaf only declares which formats it has
# (its `formats` list). This file says WHERE each format resolves and WHICH file
# extension it maps to.
#
# Formats are named after the content domain that holds them (papers / loci /
# media) rather than a bare extension, so a leaf's `formats` reads as "there is
# something in that space". Each domain mirrors the same k-graph tree.
#
# A node's content is located as:
#     <base>/<relative path>/<id>.<ext>
#
# where <relative path> is the node's path inside k-graph/ (without the id),
# e.g. k-graph/T-computer-science/L-composite/F-01-carbon-binder.yaml
#   ->  relative path       = T-computer-science/L-composite
#   ->  papers (local)      = papers/T-computer-science/L-composite/F-01-carbon-binder.md
#   ->  loci   (local)      = loci/T-computer-science/L-composite/F-01-carbon-binder.py
#   ->  media  (remote)     = https://media.cohesian.org/T-computer-science/L-composite/F-01-carbon-binder.mp4

[formats.papers]
origin = "local"    # resolved against the repo root
base = "papers"
ext = "md"

[formats.ipynb]
origin = "local"
base = "papers"
ext = "ipynb"

[formats.loci]
origin = "local"    # pure-python scene scripts (source of truth, committed)
base = "loci"
ext = "py"

[formats.media]
origin = "remote"   # rendered videos live in a bucket / CDN; not stored in git
base = "https://media.cohesian.org"
ext = "mp4"
