# K-graph resolution config.
#
# k-graph/ leaves declare abstract `data` (documents, media.scripts.scenes, media.videos).
# This file defines INFRASTRUCTURE sources (origin + mapping) and per-tree reachable sources.
#
# Each source declares:
#   origin  — base domain or URL prefix (empty for local filesystem)
#   mapping — path | hash
#   pattern — URL segment when origin is set, or hash URL template (mapping = hash)
#   mapper  — hash-map file (required when mapping = hash); path relative to repo root

[infrastructure.local]
mapping = "path"

# [infrastructure.s3bucket]
# origin = "https://media.cohesian.org"
# mapping = "path"
# pattern = "{path}"

[infrastructure.youtube]
origin = "https://www.youtube.com"
mapping = "hash"
pattern = "/watch?v={hash}"
mapper = "maps/youtube.toml"

# --- data trees: reachable sources ---------------------------------------------

[data.documents]
sources = ["local"]  # , "s3bucket"

[data.media.scripts.scenes]
sources = ["local"]

[data.media.videos]
sources = ["local", "youtube"]
serve = "youtube"
