# K-graph resolution config.
#
# k-graph/ nodes are origin-agnostic: a leaf only declares which data it holds
# (its `data` block). This file says WHERE each content tree resolves.
#
# Three mirrored trees share the same k-graph relative path:
#     data/documents/…          readable content (.md, .ipynb)
#     data/media/loci/…         scene scripts (.py, committed)
#     data/media/renders/…      rendered videos (.mp4, gitignored / remote)
#
# A node's content is located as:
#     <local_origin>/<relative path>/<id>.<ext>
#
# where <relative path> is the node's path inside k-graph/ (without the id),
# e.g. k-graph/T-computer-science/L-composite/F-01-carbon-binder.yaml
#   ->  relative path              = T-computer-science/L-composite
#   ->  data/documents             = data/documents/T-computer-science/L-composite/F-01-carbon-binder.md
#   ->  data/media/loci            = data/media/loci/T-computer-science/L-composite/F-01-carbon-binder.py
#   ->  data/media/renders (local) = data/media/renders/T-computer-science/L-composite/F-01-carbon-binder.mp4
#   ->  data/media/renders (remote)= https://media.cohesian.org/T-computer-science/L-composite/F-01-carbon-binder.mp4

[data.media.loci]
local_origin = "data/media/loci"
remote_origin = ""

[data.media.renders]
local_origin = "data/media/renders"
remote_origin = "https://media.cohesian.org"

[data.documents]
local_origin = "data/documents"
remote_origin = ""
